openapi: 3.0.3
info:
  title: Islamic LMS API
  version: 1.0.0
  description: API contract for Islamic Banking Loan Management System.
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service alive
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
  /customers:
    get:
      summary: List customers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Customer list
    post:
      summary: Create customer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
  /financing-applications:
    get:
      summary: List financing applications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Application list
    post:
      summary: Create financing application
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFinancingApplicationRequest'
      responses:
        '201':
          description: Application created
  /financing-applications/{id}/status:
    patch:
      summary: Update application status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationStatusRequest'
      responses:
        '200':
          description: Status updated
  /dashboard/kpis:
    get:
      summary: Get role-based KPI cards
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
      responses:
        '200':
          description: Dashboard KPIs
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    CreateCustomerRequest:
      type: object
      required: [customerId, fullName, cnic, mobileNumber]
      properties:
        customerId:
          type: string
        fullName:
          type: string
        cnic:
          type: string
        mobileNumber:
          type: string
        email:
          type: string
          format: email
    CreateFinancingApplicationRequest:
      type: object
      required: [applicationNo, customerId, financingType, financingAmount]
      properties:
        applicationNo:
          type: string
        customerId:
          type: string
        financingType:
          type: string
        financingAmount:
          type: number
    UpdateApplicationStatusRequest:
      type: object
      required: [applicationId, fromStatus, toStatus, remarks]
      properties:
        applicationId:
          type: string
        fromStatus:
          type: string
        toStatus:
          type: string
        remarks:
          type: string
