services:
  - type: web
    name: islamic-lms-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py seed_lms
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      # Option A: Render Postgres (uncomment below, comment Option B)
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: islamic-lms-db
      #     property: connectionString
      # Option B: Supabase — set DATABASE_URL manually in Render dashboard
      # (see docs/SUPABASE-DATABASE.md). Example shape:
      # postgresql://postgres:PASSWORD@db.PROJECT_REF.supabase.co:5432/postgres?sslmode=require
      - key: CORS_ALLOWED_ORIGINS
        value: https://lms-for-welfare.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://lms-for-welfare.vercel.app
      - key: DJANGO_ALLOWED_HOSTS
        value: islamic-lms-api.onrender.com

# Uncomment if using Render Postgres (Option A):
# databases:
#   - name: islamic-lms-db
#     plan: free
